<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- NAVBAR DYNAMIQUE -->
    <header id="header"></header>

    <script type="module">
        import { loadNavbar } from "../assets/js/script.js";
        loadNavbar();
    </script>

    <!-- CONTENU PRINCIPAL -->
    <main class="register-container">

        <div class="register-card">

            <h1>Créer un compte</h1>

            <form id="register-form">

                <label for="fullname">Nom et Prénom</label>
                <input type="text" id="fullname" required>

                <label for="gsm">N° de téléphone</label>
                <input type="text" id="gsm" required>

                <label for="email">Email</label>
                <input type="email" id="email" required>

                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" required>

                <label for="cp">Code postal</label>
                <input type="text" id="cp" required>

                <label for="ville">Ville</label>
                <input type="text" id="ville" required>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" required>

                <p class="password-info">
                    Le mot de passe doit contenir :
                    <br>- 10 caractères minimum
                    <br>- 1 majuscule
                    <br>- 1 minuscule
                    <br>- 1 chiffre
                    <br>- 1 caractère spécial
                </p>

<!--Ajout Acceptation CGV avec lien sur cette page-->
                <div class="rgpd-check">
                    <input type="checkbox" id="accept-cgv" required>
                    <label for="accept-cgv">J'accepte les <a href="./cgv.html" target="_blank">Conditions Générales de
                            Vente</a> et la politique de confidentialité.</label>
                </div>
                <button type="submit" class="btn-detail">Créer mon compte</button>
            </form>

        </div>

    </main>

    <script src="../assets/js/register.js"></script>

</body>

</html>
